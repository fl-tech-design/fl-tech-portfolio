<!-- Netzwerk Hintergrund Animation -->
<style>
  /* === NETWORK CANVAS === */
  #network-canvas {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: -1;
    opacity: 0.5;
    pointer-events: none;
  }

  /* === SEMI-TRANSPARENT PANELS === */
  .post-single,
  .list-content,
  .page-content,
  .main-content,
  article,
  .post-content,
  .profile-mode,
  .post-header {
    background: rgba(18, 18, 18, 0.45) !important;
    backdrop-filter: blur(8px) !important;
    -webkit-backdrop-filter: blur(8px) !important;
    border: 1px solid rgba(0, 160, 255, 0.12) !important;
    border-radius: 12px !important;
    box-shadow: 0 4px 30px rgba(0, 0, 0, 0.2) !important;
  }

  /* === PADDING === */
  .post-content,
  .post-single,
  article {
    padding: 20px 25px !important;
  }

  .page-header h1,
  .post-header {
    background: rgba(18, 18, 18, 0.4) !important;
    backdrop-filter: blur(8px) !important;
    -webkit-backdrop-filter: blur(8px) !important;
    padding: 15px 20px !important;
    margin-bottom: 20px !important;
    border-radius: 10px;
    border: 1px solid rgba(0, 160, 255, 0.1) !important;
  }

  /* === HAUPTTITEL (h1) IN HELLEM CYAN === */
  .post-title,
  h1.post-title,
  .page-header h1 {
    color: #7dd3fc !important;
    text-shadow: 0 0 20px rgba(125, 211, 252, 0.5) !important;
    font-weight: 700 !important;
  }

  /* === HAUPT-SEKTIONEN (h2) IN TÜRKIS === */
  .post-content h2 {
    color: #00e5ff !important;
    border-bottom: 2px solid rgba(0, 212, 255, 0.3) !important;
    padding-bottom: 8px !important;
    margin-top: 30px !important;
    margin-bottom: 20px !important;
    text-shadow: 0 0 10px rgba(0, 212, 255, 0.4) !important;
    font-size: 1.8em !important;
  }

  /* === UNTER-SEKTIONEN (h3) DUNKLER === */
  .post-content h3 {
    color: #0088aa !important;
    border-bottom: 1px solid rgba(0, 136, 170, 0.4) !important;
    padding-bottom: 6px !important;
    margin-top: 25px !important;
    margin-bottom: 15px !important;
    text-shadow: none !important;
    font-size: 1.4em !important;
    font-weight: 600 !important;
  }

  /* === MODERNES ZITAT-DESIGN === */
  .post-content blockquote {
    position: relative;
    margin: 25px 0;
    padding: 20px 25px 20px 60px;
    background: rgba(0, 212, 255, 0.08);
    border-left: 4px solid #00d4ff;
    border-radius: 0 12px 12px 0;
    font-style: italic;
    color: #c0c0c0;
    box-shadow: 0 2px 15px rgba(0, 212, 255, 0.1);
  }

  /* Zitat-Icon (Anführungszeichen) */
  .post-content blockquote::before {
    content: '"';
    position: absolute;
    left: 20px;
    top: 15px;
    font-size: 3em;
    color: #00d4ff;
    opacity: 0.4;
    font-family: Georgia, serif;
    line-height: 1;
  }

  .post-content blockquote p {
    margin: 0;
    font-size: 1.1em;
    line-height: 1.6;
  }

  /* === LINKS IN HELLBLAU === */
  .post-content a,
  article a,
  .post-footer a {
    color: #4da6ff !important;
    text-decoration: none;
    border-bottom: 1px dotted rgba(77, 166, 255, 0.5);
    transition: all 0.2s ease;
  }

  .post-content a:hover,
  article a:hover,
  .post-footer a:hover {
    color: #7ec4ff !important;
    border-bottom-style: solid;
    border-bottom-color: #7ec4ff;
    text-shadow: 0 0 8px rgba(77, 166, 255, 0.4);
  }

  /* === TIMELINE PERIODEN === */
  .timeline-period {
    display: inline-block;
    padding: 4px 12px;
    background: rgba(0, 212, 255, 0.2);
    color: #00e5ff !important;
    border-radius: 4px;
    font-weight: bold;
    margin-bottom: 8px;
    border: 1px solid rgba(0, 212, 255, 0.3);
  }

  /* === HR LINIEN === */
  .post-content hr {
    border: none;
    height: 2px;
    background: linear-gradient(to right, rgba(0, 212, 255, 0.5), transparent);
    margin: 20px 0;
  }

  /* Text-Lesbarkeit */
  .post-content p {
    line-height: 1.8;
    margin: 15px 0;
  }

  .post-content p,
  .post-content li,
  .post-content a {
    text-shadow: 0 0 1px rgba(0, 0, 0, 0.4);
  }

  .post-content ul,
  .post-content ol {
    padding-left: 25px !important;
    margin: 15px 0 !important;
  }

  .post-content li {
    margin: 8px 0 !important;
  }

  /* Hover-Effekt für Panels */
  .post-single:hover,
  article:hover {
    border-color: rgba(0, 160, 255, 0.3) !important;
    box-shadow: 0 0 35px rgba(0, 160, 255, 0.15) !important;
    transition: all 0.3s ease !important;
  }
</style>

<script>
// ============================================
// 1. NETWORK ANIMATION
// ============================================
document.addEventListener('DOMContentLoaded', () => {
  const canvas = document.createElement('canvas');
  canvas.id = 'network-canvas';
  document.body.insertBefore(canvas, document.body.firstChild);
  const ctx = canvas.getContext('2d');
  let particles = [];
  let time = 0;
  
  function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
  window.addEventListener('resize', resize);
  resize();
  
  class Particle {
    constructor() {
      this.x = Math.random() * canvas.width;
      this.y = Math.random() * canvas.height;
      this.vx = (Math.random() - 0.5) * 0.3;
      this.vy = (Math.random() - 0.5) * 0.3;
      this.size = Math.random() * 2 + 1;
      this.baseAlpha = Math.random() * 0.3 + 0.3;
    }
    update() {
      this.x += this.vx; this.y += this.vy;
      if (this.x < 0 || this.x > canvas.width) this.vx *= -1;
      if (this.y < 0 || this.y > canvas.height) this.vy *= -1;
    }
    draw() {
      const alpha = this.baseAlpha + Math.sin(time * 0.02 + this.x * 0.01) * 0.15;
      ctx.fillStyle = `rgba(0, 160, 255, ${alpha})`;
      ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill();
    }
  }
  
  for (let i = 0; i < 100; i++) particles.push(new Particle());
  
  function animate() {
    time++;
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    particles.forEach(p => { p.update(); p.draw(); });
    
    for (let i = 0; i < particles.length; i++) {
      for (let j = i + 1; j < particles.length; j++) {
        const dx = particles[i].x - particles[j].x;
        const dy = particles[i].y - particles[j].y;
        const dist = Math.sqrt(dx*dx + dy*dy);
        if (dist < 180) {
          const lineAlpha = (0.25 * (1 - dist/180)) + Math.sin(time * 0.03 + dist * 0.01) * 0.1;
          ctx.strokeStyle = `rgba(0, 170, 255, ${lineAlpha})`;
          ctx.lineWidth = 1;
          ctx.beginPath(); ctx.moveTo(particles[i].x, particles[i].y);
          ctx.lineTo(particles[j].x, particles[j].y); ctx.stroke();
        }
      }
    }
    requestAnimationFrame(animate);
  }
  animate();
});

// ============================================
// 2. AUTO EXTERNAL LINKS (NEW TAB)
// ============================================
document.addEventListener('DOMContentLoaded', () => {
  const currentDomain = window.location.hostname;
  
  document.querySelectorAll('a').forEach(link => {
    const href = link.getAttribute('href');
    
    if (href && href.startsWith('http') && !href.includes(currentDomain)) {
      link.setAttribute('target', '_blank');
      link.setAttribute('rel', 'noopener noreferrer');
    }
  });
});
</script>
